    <!-- ── STRUCTURED DATA: FAQPage (drives "People Also Ask" in Google) ───── -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is Cartasis?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Cartasis is a visual workflow for AI filmmakers. It helps you turn scripts into structured scenes, shots, references, and continuity-ready plans before moving into image generation, video generation, lipsync, and editing."
      }
    },
    {
      "@type": "Question",
      "name": "How does the Cartasis workflow start?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Most projects start in a Script node or directly in Scene nodes. You can write a rough idea, treatment, or screenplay, then split that writing into structured scenes and break each scene into shot plans."
      }
    },
    {
      "@type": "Question",
      "name": "How do scenes turn into shots in Cartasis?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Each Scene node can generate Shot nodes from the scene brief. Those shots become structured production units with camera size, angle, movement, lens, lighting, dialogue, visual goals, and director notes."
      }
    },
    {
      "@type": "Question",
      "name": "Why not just prompt Kling or Veo directly?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Direct prompting usually turns into trial and error. Cartasis is designed to organize scene intent, shot logic, references, and continuity before generation, giving you more control and often wasting fewer credits."
      }
    },
    {
      "@type": "Question",
      "name": "What is a World Bible in Cartasis?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The World Bible is Cartasis's character and location consistency system. You create Bible entries for every character, location, and object in your story, then reuse those references across scenes, shots, images, and video generation."
      }
    },
    {
      "@type": "Question",
      "name": "Can I review or repair a scene before generating more?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Scene nodes can run continuity review and repair passes, helping you catch missing beats, overcrowded scene logic, and structural problems before you spend more time or credits on generation."
      }
    }
  ]
}
</script>

    <!-- ── STRUCTURED DATA: HowTo (workflow walkthrough for rich snippets) ─── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to produce an AI video with Cartasis",

      "totalTime": "PT30M",
      "step": [
        {
          "@type": "HowToStep",
          "name": "Write your script",
          "text": "Use the Script node to write or upload your screenplay. Cartasis can turn a rough idea into structured scenes you can plan visually.",
          "position": 1
        },
        {
          "@type": "HowToStep",
          "name": "Build your World Bible",
          "text": "Create Bible entries for every character, location, and object. Upload reference images so continuity and visual identity can flow through every scene and shot.",

        },
        {
          "@type": "HowToStep",
          "name": "Plan your shots",
          "text": "Add Scene and Shot nodes to your canvas. Define camera size, angle, movement, lighting, dialogue, and intent for each shot. Review continuity before generation.",
          "position": 3
        },
        {
          "@type": "HowToStep",
          "name": "Generate reference images",
          "text": "Wire Image nodes to your shots and generate AI images using your Bible references when you want to lock a shot visually before rendering video.",
