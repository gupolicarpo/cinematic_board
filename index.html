    <!-- ── STRUCTURED DATA: FAQPage (drives "People Also Ask" in Google) ───── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Cartasis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cartasis is an AI-powered video production canvas that lets you go from script to finished video in one place. It combines AI script writing, cinematic shot planning, image generation, Kling AI video generation, Google Veo video generation, AI lipsync, music composition, and video editing in a visual node-based workflow."
          }
        },
        {
          "@type": "Question",
          "name": "How does Cartasis compare to Runway or Pika?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unlike Runway or Pika which are single-generation tools, Cartasis is a full production pipeline. You write your script, plan scenes and shots with a storyboard, generate images for character and location consistency, produce videos with multiple AI models (Kling and Google Veo), add lipsync dialogue, compose music, and edit the final cut — all without leaving the canvas."
          }
        },
        {
          "@type": "Question",
          "name": "What AI video models does Cartasis support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cartasis supports Kling AI (Kling 3.0 video generation, text-to-video, image-to-video, multi-shot sequences, and lipsync workflows) and Google Veo 3.1 (text-to-video, image-to-video, first and last frame interpolation). More models are added regularly."
          }
        },
        {
          "@type": "Question",
          "name": "Can I create videos with dialogue and lipsync?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Cartasis supports advanced AI lipsync with multi-speaker dialogue. Write screenplay-style dialogue in your shot nodes, and Cartasis automatically generates TTS audio for each character, identifies faces in your video, and applies lipsync sequentially — matching each speaker's voice to their face."
          }
        },
        {
          "@type": "Question",
          "name": "What is a World Bible in Cartasis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The World Bible is Cartasis's character and location consistency system. You create Bible entries for every character, location, and object in your story — each with a reference image. When you generate videos or images, the Bible ensures your characters look the same across every shot."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Free plan includes 80 AI credits per month, access to Kling Standard video generation, and up to 2 projects. Paid plans start at $19/month (Indie — 900 credits) with no watermark, and go up to $99/month (Studio — 6000 credits, 3 seats, priority generation)."
          }
        },
        {
          "@type": "Question",
          "name": "What does 'node-based workflow' mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cartasis uses a visual canvas where each element — scene, shot, image, video generator, AI command — is a node you can wire together. You can see exactly how your production flows, connect shots to scenes, wire reference images into video generators, and build complex multi-scene pipelines visually."
          }
        }
      ]
    }
    </script>
